name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-12
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build with Swift Package Manager
      run: swift build -v
    
    - name: Run tests
      run: swift test -v
